<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR App</title>
  <style>
    body { margin: 0; }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="appFrame"></iframe>

<script>
  const path = window.location.pathname.split("/");
  const id = path[path.length - 1] || "TN141";

  const url = "https://script.google.com/macros/s/AKfycbzQYny_YiyDS3Np0qgA6QqPO9TW6m8hEEP1VvoVH7Ey2WV2UcSUDeF8PuK_kJQU1f9v/exec?id=" + id;

  document.getElementById("appFrame").src = url;
</script>

</body>
</html>
