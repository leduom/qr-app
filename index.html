<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { margin: 0; }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

<script>
  // Lấy path từ 404 redirect hoặc URL thường
  const params = new URLSearchParams(window.location.search);
  let path = params.get("path") || window.location.pathname;

  const parts = path.split("/");
  let id = parts[parts.length - 1];

  if (!id || id === "") {
    id = "TN141";
  }

  const url = "https://script.google.com/macros/s/AKfycbzQYny_YiyDS3Np0qgA6QqPO9TW6m8hEEP1VvoVH7Ey2WV2UcSUDeF8PuK_kJQU1f9v/exec?id=" + id;

  document.write('<iframe src="' + url + '"></iframe>');
</script>

</body>
</html>
