<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { margin: 0; }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

<script>
  function loadApp() {
    const path = window.location.pathname.split("/");
    let id = path[path.length - 1];

    if (!id || id === "" || id === "qr-app") {
      id = "TN141";
    }

    const url = "https://script.google.com/macros/s/AKfycbzQYny_YiyDS3Np0qgA6QqPO9TW6m8hEEP1VvoVH7Ey2WV2UcSUDeF8PuK_kJQU1f9v/exec?id=" + id;

    document.body.innerHTML = '<iframe src="' + url + '"></iframe>';
  }

  loadApp();
</script>

</body>
</html>
