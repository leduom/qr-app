<body>
  <h2>Đang tải dữ liệu...</h2>

  <script>
    // Lấy path từ URL hoặc từ 404 redirect
    const params = new URLSearchParams(window.location.search);
    let path = params.get("path") || window.location.pathname;

    // Lấy ID cuối
    let id = path.split("/").pop();

    if (!id || id === "") {
      id = "TN141"; // mặc định
    }

    // Link GAS của bạn
    const gasUrl = "https://script.google.com/macros/s/AKfycbzQYny_YiyDS3Np0qgA6QqPO9TW6m8hEEP1VvoVH7Ey2WV2UcSUDeF8PuK_kJQU1f9v/exec?id=" + id;

    // Redirect sang GAS (cách đơn giản nhất – đảm bảo chạy)
    window.location.href = gasUrl;

    // Nếu bạn muốn fetch (ẩn link) thì dùng đoạn này (tuỳ chọn)

    fetch(gasUrl)
      .then(res => res.text())
      .then(html => {
        document.open();
        document.write(html);
        document.close();
      });
    */
  </script>
</body>
</html>
